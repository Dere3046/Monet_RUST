name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - i686-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        run: cross build --release --target ${{ matrix.target }} --manifest-path rust/Cargo.toml --bin monet
      - name: Package
        run: |
          mkdir -p dist
          cp rust/target/${{ matrix.target }}/release/monet dist/monet-linux-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: monet-linux-${{ matrix.target }}
          path: dist/*

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --manifest-path rust/Cargo.toml --bin monet
      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item rust/target/${{ matrix.target }}/release/monet.exe dist/monet-windows-${{ matrix.target }}.exe
      - uses: actions/upload-artifact@v4
        with:
          name: monet-windows-${{ matrix.target }}
          path: dist/*

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: true
