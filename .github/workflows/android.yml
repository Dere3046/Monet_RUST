name: Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - armv7-linux-androideabi
          - aarch64-linux-android
          - i686-linux-android
          - x86_64-linux-android
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
      - name: Build
        run: |
          cd rust
          cargo ndk --target ${{ matrix.target }} -- build --release --bin monet
      - name: Package
        run: |
          mkdir -p dist
          cp rust/target/${{ matrix.target }}/release/monet dist/monet-android-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: monet-android-${{ matrix.target }}
          path: dist/*

  release:
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: true
